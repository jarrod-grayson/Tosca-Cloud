# ============================================================================
# Tosca Cloud Playlist execution pipeline
# ----------------------------------------------------------------------------
# Triggers a Tosca Cloud playlist run, waits for it to finish, publishes the
# results to the Tests tab, and attaches step-level HTML detail to any failures.
# Docs: https://aka.ms/yaml
# ============================================================================

# This example leverages a Manual/other-trigger only: no CI trigger on commits or PRs.
# Kick this off manually, from a schedule, or from another pipeline.
# Change to a branch list (e.g. "- main") if you want it to run on push.

trigger:
- none

# ----------------------------------------------------------------------------
# Connection values come from the pipeline UI (or a variable group) and are
# referenced directly below. Expected variables:
#   ToscaBaseUrl        - full API base URL, e.g. https://amspresales.my.tricentis.com
#   ToscaAuthURL        - full OAuth token endpoint (Okta)
#   ToscaClientId       - OAuth client id
#   ToscaClientSecret   - OAuth client secret  (MUST be a SECRET variable)
#   ToscaWorkspaceID    - workspace/space GUID (used in API paths)
#   ToscaWorkspaceName  - workspace/space display name (used in portal deep-links)
# If they live in a variable group, add it here (the list form below is
# required once a "- group:" entry is present):
#   - group: <your-variable-group-name>
#
# The values below are pipeline-specific (not connection config), so they live
# in the YAML rather than the UI.
# ----------------------------------------------------------------------------
variables:
  - name: toscaPlaylistName
    value: Regression - Web To Lead - End to End
  # Per-build results path. Agent.TempDirectory is wiped at the start of each
  # job, so a failed run can't republish a previous build's results.xml and
  # concurrent builds on this agent won't collide. Expanded at job runtime.
  - name: toscaResultsFile
    value: $(Agent.TempDirectory)\ToscaResults\results.xml

# Single stage that holds the whole test workflow. Add more stages
# (Deploy, etc.) later if this becomes part of a larger release.

stages:

- stage: Test
  displayName: Test
  jobs:
    - job: Test

      # Bound the whole job just above the script's own 2h MaxPollingTimeout so
      # the script's timeout+cancel logic fires first, instead of ADO killing
      # the job mid-poll and leaving an orphaned server-side run. Self-hosted
      # jobs otherwise have no time limit.
      timeoutInMinutes: 135

      # Runs on your self-hosted "Default" agent pool. This agent must be able
      # to reach the Tosca tenant, the Okta token URL, Azure DevOps (for the
      # attachment REST calls), and the blob host the step JSON is served from.

      pool:
        name: Default
      steps:

      # -------------------------------------------------------------------
      # Warm-up / sanity step. Confirms the agent and job are alive before
      # the real work starts. Safe to remove; handy as a log marker.
      # -------------------------------------------------------------------
      - script: echo Test
        displayName: 'Prepare Testing'

      # -------------------------------------------------------------------
      # Execute the Tosca Cloud playlist.
      # Authenticates (client credentials), resolves the playlist by name, starts a run, polls until it finishes, and writes JUnit results.
      #   -StartNewRun / -MonitorRun / -RetrieveResults drive the phases.
      #   -PollingInterval / -MaxPollingTimeout bound the wait (here: poll every 10s, give up after 2h).
      #   -CancelOnTimeout cancels the server-side run if monitoring times out.
      # The client secret is passed via env (TOSCA_CLIENT_SECRET), not on the
      # command line; the script reads it as the default for -ClientSecret.
      # This task exits non-zero if the run doesn't succeed, which fails the job - the reason every later task uses condition: always().
      # -------------------------------------------------------------------

      - task: PowerShell@2
        displayName: 'Execute Tosca Cloud Playlist and Retrieve Results'
        env:
          TOSCA_CLIENT_SECRET: $(ToscaClientSecret)
        inputs:
          filePath: $(System.DefaultWorkingDirectory)\tosca_cloud_execution_client.ps1
          arguments: >
            -BaseUrl "$(ToscaBaseUrl)"
            -ClientId "$(ToscaClientId)"
            -TokenUrl "$(ToscaAuthURL)"
            -WorkspaceId "$(ToscaWorkspaceID)"
            -Scope "tta"
            -PlaylistName "$(toscaPlaylistName)"
            -StartNewRun
            -MonitorRun
            -PollingInterval 10
            -MaxPollingTimeout 7200
            -CancelOnTimeout
            -RetrieveResults
            -JUnitResultsFile "$(toscaResultsFile)"

      # -------------------------------------------------------------------
      # Publish results to the run's Tests tab.
      # Points directly at the file the execution script wrote. The script
      # already re-serializes JUnit to consistent UTF-8 via XmlWriter, so the
      # old separate "Convert JUnit results to UTF-8" step is no longer needed.
      # always() so failures are still published (that's when you need them).
      # -------------------------------------------------------------------

      - task: PublishTestResults@2
        displayName: 'Publish Test Results'
        condition: always()
        inputs:
          testResultsFiles: '$(toscaResultsFile)'
          testResultsFormat: 'JUnit'

      # -------------------------------------------------------------------
      # Enrich failed tests with step-level HTML and attach to results.
      # Re-derives the run id, pulls each failed test case's step JSON, renders one HTML report per failure, writes a Markdown summary tab,
      # and attaches each report to the matching failed result in the Tests tab.
      # Runs on failure too (condition: always) - that's when it matters.
      # SYSTEM_ACCESSTOKEN is required to attach files to test results (the build service identity also needs Manage/Publish test results).
      # Client secret comes from env, same as the execution task.
      # -------------------------------------------------------------------

      - task: PowerShell@2
        displayName: 'Attach step-level detail to failed tests'
        condition: always()
        env:
          SYSTEM_ACCESSTOKEN: $(System.AccessToken)
          TOSCA_CLIENT_SECRET: $(ToscaClientSecret)
        inputs:
          filePath: $(System.DefaultWorkingDirectory)\Publish-ToscaStepDetails.ps1
          arguments: >
            -BaseUrl "$(ToscaBaseUrl)"
            -ClientId "$(ToscaClientId)"
            -TokenUrl "$(ToscaAuthURL)"
            -WorkspaceId "$(ToscaWorkspaceID)"
            -Scope "tta"
            -PlaylistName "$(toscaPlaylistName)"
            -OutputDir "$(Build.ArtifactStagingDirectory)\ToscaStepReports"
            -WorkspaceName "$(ToscaWorkspaceName)"
            -AttachToTestResults $true

      # -------------------------------------------------------------------
      # Publish the rendered reports as a downloadable pipeline artifact.
      # This is the safety net: even if a per-result attachment can't match a name or the OAuth token is missing,
      # every HTML report is still here under the "ToscaStepReports" artifact. always() so it runs on failure.
      # -------------------------------------------------------------------

      - task: PublishPipelineArtifact@1
        displayName: 'Publish step-detail reports'
        condition: always()
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)\ToscaStepReports'
          artifact: 'ToscaStepReports'
          publishLocation: 'pipeline'
