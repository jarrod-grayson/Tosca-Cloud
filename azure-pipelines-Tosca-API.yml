# Tosca Cloud playlist execution pipeline (execution client only).
# Reuses tosca_cloud_execution_client.ps1 from the repo.

trigger:
- none

variables:
  - name: toscaPlaylistName
    value: Regression - Web To Lead - End to End
  # Per-build results path. Agent.TempDirectory is wiped at the start of each job,
  # so a failed run can't republish a previous build's results, and runs of this
  # pipeline won't collide with the other pipeline on the same agent.
  - name: toscaResultsFile
    value: $(Agent.TempDirectory)\ToscaResults\results.xml

stages:

- stage: Test
  displayName: Test
  jobs:
    - job: Test
      # Above the script's 2h MaxPollingTimeout so it can self-cancel first.
      timeoutInMinutes: 135
      pool:
        name: Default
      steps:
      - script: echo Test
        displayName: 'Prepare Testing'

      - task: PowerShell@2
        displayName: 'Execute Tosca Cloud Playlist and Retrieve Results'
        env:
          TOSCA_CLIENT_SECRET: $(ToscaClientSecret)
        inputs:
          filePath: $(System.DefaultWorkingDirectory)\tosca_cloud_execution_client.ps1
          arguments: >
            -BaseUrl "$(ToscaBaseUrl)"
            -ClientId "$(ToscaClientId)"
            -TokenUrl "$(ToscaAuthURL)"
            -WorkspaceId "$(ToscaWorkspaceID)"
            -Scope "tta"
            -PlaylistName "$(toscaPlaylistName)"
            -ParameterOverride "Browser=Chrome"
            -StartNewRun
            -MonitorRun
            -PollingInterval 10
            -MaxPollingTimeout 7200
            -CancelOnTimeout
            -RetrieveResults
            -JUnitResultsFile "$(toscaResultsFile)"

      - task: PublishTestResults@2
        displayName: 'Publish Test Results'
        condition: always()
        inputs:
          testResultsFiles: '$(toscaResultsFile)'
          testResultsFormat: 'JUnit'